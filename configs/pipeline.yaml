# Pipeline behaviour — thresholds, cohort sizing, versioning, mode.
# Env var overrides: RDF_ROBOMETER_THRESHOLD, RDF_DEMINF_THRESHOLD.

# ── Decision thresholds ───────────────────────────────────────────────────────

# Stage A gate: episodes with robometer_success_pred < this are dropped
robometer_threshold: 0.8

# Monotonicity dip check — max allowed per-frame decrease in progress / success_pred.
# E.g. 0.05 flags any episode where a frame drops more than 5% below the previous frame.
# Set to 1.0 to disable the check (no episode can dip by more than 100%).
robometer_progress_dip_tolerance: 0.8

# Stage B trim: episodes with deminf_score < this are dropped.
# Ignored when deminf_filter_bottom_pct > 0.
deminf_threshold: -1.0

# Drop the bottom N% of episodes by DemInf score (percentile-based filter).
# After scoring, the Nth percentile of all scored episodes becomes the threshold —
# so exactly this fraction is always dropped regardless of absolute score range.
# Typical range: 0.10 (drop worst 10%) to 0.30 (drop worst 30%).
# Set to 0.0 to disable and use the fixed deminf_threshold above instead.
deminf_filter_bottom_pct: 0.20

# ── Versioning ────────────────────────────────────────────────────────────────

vae_version: v1
reference_set_version: v1

# ── Embodiment ────────────────────────────────────────────────────────────────

# Default embodiment used by Stage B to look up MCAP topic names
embodiment: raybot

# ── Task ID ───────────────────────────────────────────────────────────────────

# Fallback task_id used when metadata.yaml has no task_id field.
# DemInf episode data is organised under deminf_data_dir/{task_id}/train/.
default_task_id: "003"

# ── Default Robometer instruction ─────────────────────────────────────────────

# Task description passed to Robometer when metadata.yaml has no instruction field.
# Should describe what a successful episode looks like so the VLM can score it.
# Priority: RDF_INSTRUCTION env var > metadata.yaml instruction field > this value.
# Example: "Pick up the red block and place it in the bin."
default_instruction: "Pick up the red block and place it in the green slab"

# ── Pipeline mode ─────────────────────────────────────────────────────────────

# sequential: accumulate all Stage A results, then run one DemInf cohort per task
# parallel: emit cohorts incrementally as deminf_cohort_min episodes accumulate
mode: sequential

# ── Cohort accumulation (parallel mode only) ──────────────────────────────────

deminf_cohort_min: 50
deminf_cohort_max: 300
deminf_cohort_timeout_hours: 12.0

# ── AWS resource names (cloud deployments only) ───────────────────────────────

raw_bucket: rdf-raw
clean_bucket: rdf-clean
registry_bucket: rdf-registry
episode_queue_name: rdf-episodes
cohort_queue_name: rdf-cohorts
